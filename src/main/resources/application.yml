server:
  port: 8081
spring:
  application:
    name: anong-lingxian
  datasource:
    url: jdbc:h2:mem:lingxian;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ustccb.lingxian.entity
